name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Confidence is intentionally tiered. The release gate is the protected-branch
# proof: it provisions a new Supabase stack and does not convert absent Docker,
# DB, browser, RLS, or migration proof into a pass.
jobs:
  developer-feedback:
    name: Fast developer feedback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run pilot:audit
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test

  static-operations:
    name: Static operational confidence
    runs-on: ubuntu-latest
    # These inert values exercise configuration shape/alias validation only;
    # no command here claims a live database check.
    env:
      AGIR_ENV: test
      SUPABASE_URL: https://ci.invalid
      SUPABASE_ANON_KEY: ci-static-only-not-a-secret
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ops:check

  release-confidence:
    name: Mandatory Supabase release confidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v2
        with:
          version: 2.109.0
      - run: supabase start
      - name: Export fresh Supabase environment
        run: |
          eval "$(supabase status -o env)"
          {
            echo "AGIR_ENV=test"
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "DATABASE_URL=$DB_URL"
          } >> "$GITHUB_ENV"
      - run: node scripts/ensure-demo-user.mjs
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run ops:release
      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
