name: CI

# Keeps `main` honest: every push and PR must pass lint, typecheck, tests, and a
# production build. A separate job regenerates the Supabase types from the
# migrations and fails if the committed types have drifted out of sync (the exact
# gate prescribed in DEPLOYMENT.md). Type drift is what silently let 70+ tsc
# errors accumulate on main before this workflow existed.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run pilot:audit
      - run: npm run typecheck
      # lint enforces a --max-warnings ratchet (see package.json); lower the cap
      # as the no-explicit-any backlog is paid down so it can only shrink.
      - run: npm run lint
      - run: npm run test
      # vite.config.ts defaults missing Supabase env to "" so the build needs no
      # secrets; runtime config is injected by the host (Vercel) at deploy time.
      - run: npm run build

  schema-types:
    name: Supabase types in sync with migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # Boots the local stack and applies every migration in supabase/migrations.
      - run: supabase start
      - name: Regenerate types from the migrated schema
        run: supabase gen types typescript --local --schema public > src/integrations/supabase/types.ts
      - name: Match repository formatting
        run: npx prettier --write src/integrations/supabase/types.ts
      - name: Fail if committed types are stale
        run: |
          if ! git diff --exit-code -- src/integrations/supabase/types.ts; then
            echo "::error::src/integrations/supabase/types.ts is out of date. Regenerate it with: supabase gen types typescript --local --schema public > src/integrations/supabase/types.ts"
            exit 1
          fi

  e2e:
    name: Playwright browser E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # Boots the local stack and applies every migration in supabase/migrations.
      - run: supabase start
      # Bridge the local stack's generated keys into the env names the app and
      # seed scripts read (vite.config.ts + scripts/*.mjs).
      - name: Export Supabase env
        run: |
          eval "$(supabase status -o env)"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"
      - name: Seed the demo login user
        run: node scripts/ensure-demo-user.mjs
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E (boots dev server via Playwright webServer)
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rls:
    name: Postgres RLS policy proof
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agir_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agir_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/agir_test
      PGSSLMODE: disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run rls:bootstrap
      - run: npm run migrate
      - run: npm run migrate:dry-run
      - run: npm run test:rls

  schema-drift-gate:
    name: Schema drift deploy gate
    runs-on: ubuntu-latest
    # Hard gate: fails the build if the live DB has pending/extra migrations
    # relative to this commit. It is a no-op (passes) when no DB secret is
    # configured, so fork PRs are unaffected; arm it by setting the
    # SCHEMA_DRIFT_DATABASE_URL secret (a read-capable URL to prod/staging).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run drift:check
        env:
          SCHEMA_DRIFT_DATABASE_URL: ${{ secrets.SCHEMA_DRIFT_DATABASE_URL }}

  ephemeral-db-smoke:
    name: Ephemeral DB migration + RLS smoke
    runs-on: ubuntu-latest
    # A GitHub Actions service container is created fresh for every job run, so
    # each push/PR gets a brand-new, disposable Postgres. The smoke script
    # bootstraps the Supabase-compatible auth/storage schema, applies all
    # migrations against the empty DB, and runs the live RLS suite -- proving a
    # clean-room deploy from zero (not just an incremental migration on an
    # already-migrated DB). The DB name contains "test" to satisfy the
    # destructive-RLS guard in src/test/rls/assert-test-db.mjs.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agir_ephemeral_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agir_ephemeral_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      EPHEMERAL_DATABASE_URL: postgres://postgres:postgres@localhost:5432/agir_ephemeral_test
      PGSSLMODE: disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run smoke:ephemeral-db
